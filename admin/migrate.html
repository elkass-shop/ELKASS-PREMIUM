<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ELKASS — Migracja do bazy</title><style>body{font:16px/1.55 system-ui;margin:0;background:#f4f5f7;color:#17181b}.wrap{max-width:960px;margin:48px auto;padding:24px}.card{background:#fff;border-radius:20px;padding:28px;box-shadow:0 14px 45px #0001;margin-bottom:18px}button{border:0;border-radius:12px;padding:13px 18px;font-weight:700;cursor:pointer;background:#e30613;color:#fff}input{width:100%;padding:12px;border:1px solid #ccd0d5;border-radius:10px;margin:6px 0 14px}pre{white-space:pre-wrap;background:#111;color:#d8fbd8;padding:16px;border-radius:12px;min-height:120px}.ok{color:#087c3f}.bad{color:#b00020}</style></head><body><main class="wrap"><div class="card"><h1>Migracja ELKASS do Supabase</h1><p>Najpierw uruchom migracje SQL 001–005, ustaw <code>config/cloud-config.js</code>, a następnie zaloguj się kontem dodanym do <code>admin_profiles</code>.</p><label>E-mail administratora</label><input id="email" type="email"><label>Hasło</label><input id="password" type="password"><button id="login">Zaloguj</button> <button id="run">Przenieś dane lokalne</button></div><div class="card"><h2>Status</h2><pre id="log">Oczekiwanie…</pre></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../config/cloud-config.js"></script><script src="../assets/js/elkass-db-v12.js"></script><script>
const log=(m)=>document.querySelector('#log').textContent+='\n'+m; document.querySelector('#log').textContent='DB configured: '+ElkassDB.ready();
document.querySelector('#login').onclick=async()=>{try{await ElkassDB.signIn(email.value,password.value);log('✓ Zalogowano')}catch(e){log('✗ '+e.message)}};
const read=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||'null')??f}catch{return f}};
document.querySelector('#run').onclick=async()=>{try{if(!await ElkassDB.session())throw Error('Najpierw zaloguj administratora');let n=0;
 const products=[...read('elkass_products_live',[]),...read('elkass.final.products',[])];for(const p of new Map(products.map(x=>[x.id,x])).values()){await ElkassDB.upsert('products',{...p,project_slug:'elkass',status:p.status||'published',is_active:p.is_active!==false},'id');n++}
 const cats=read('elkass.categories.v1',[]);const ids={};for(const c of cats.filter(x=>!x.parent_id&&!x.parent)){const id=crypto.randomUUID();ids[c.id||c.slug]=id;await ElkassDB.upsert('categories',{id,project_slug:'elkass',name:c.name,slug:c.slug||c.id,description:c.description||'',image_url:c.image||'',sort_order:c.sort_order||0,is_active:true},'project_slug,slug');n++}for(const c of cats.filter(x=>x.parent_id||x.parent)){await ElkassDB.upsert('categories',{project_slug:'elkass',parent_id:ids[c.parent_id||c.parent]||null,name:c.name,slug:c.slug||c.id,description:c.description||'',image_url:c.image||'',sort_order:c.sort_order||0,is_active:true},'project_slug,slug');n++}
 const brands=read('elkass.brands.v1',[]);for(const b of brands){const name=typeof b==='string'?b:b.name;await ElkassDB.upsert('brands',{project_slug:'elkass',name,slug:(b.slug||name).toLowerCase().normalize('NFKD').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''),logo_url:b.logo||'',is_active:true},'project_slug,slug');n++}
 log('✓ Migracja zakończona. Rekordów: '+n)}catch(e){log('✗ '+e.message)}};
</script></body></html>
